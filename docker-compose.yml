services:
  mysql:
    image: mysql:8.4
    container_name: filmoracle-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: filoracle2026
      MYSQL_DATABASE: filmoracle
      MYSQL_USER: filmoracle
      MYSQL_PASSWORD: filmoracle
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    deploy:
      resources:
        limits:
          memory: 512M

  tomcat:
    build: .
    container_name: filmoracle-tomcat
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/filmoracle?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      DB_USER: filmoracle
      DB_PASSWORD: filmoracle
      JAVA_OPTS: "-Xms256m -Xmx768m -Dfile.encoding=UTF-8"
      UPLOAD_DIR: /app/uploads
    volumes:
      - upload_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 768M

volumes:
  mysql_data:
  upload_data:
